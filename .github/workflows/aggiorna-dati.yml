name: Aggiorna dati Polis
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Scarica atti da Normattiva
        run: python aggiorna_normattiva.py
      - name: Pubblica se ci sono novità
        run: |
          git config user.name  "polis-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dati/normattiva.json
          git diff --cached --quiet || git commit -m "Dati Normattiva $(date -u +%F)"
          git push
